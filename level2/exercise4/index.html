<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

    <header class="header">
        <div class="top-bar">
            <div class="logo">
                <img src="assets/img/logo.png" alt="Japan Tourism Logo">
            </div>

            <nav class="nav">
                <ul>
                    <li><a href="#"><i class="fa-solid fa-house"></i> Inicio</a></li>
                    <li><a href="#"><i class="fa-solid fa-route"></i> Rutas</a></li>
                    <li><a href="#"><i class="fa-solid fa-hotel"></i> Hoteles</a></li>
                    <li><a href="#"><i class="fa-solid fa-plane"></i> Vuelos</a></li>
                    <li><a href="#"><i class="fa-solid fa-envelope"></i> Contacto</a></li>
                </ul>
            </nav>

            <div class="social">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>

        <div class="hero">
            <h1>Disfruta de la experiencia de otros viajeros</h1>
        </div>
    </header>

    <div class="black-box">
        <section class="banner-outer">
            <div class="banner-inner">
                <strong>.banner</strong>
            </div>
        </section>
    </div>

    <div class="black-box">
        <main class="main-content">
            <section class="articles-zone">
                <div class="articles-grid">
                    <article class="article">.article</article>
                    <article class="article">.article</article>
                    <article class="article">.article</article>
                    <article class="article">.article</article>
                </div>
                <nav class="navigation">.navigation</nav>
            </section>

            <aside class="sidebar">
                <div class="advertising">.advertising</div>
                <div class="advertising">.advertising</div>
            </aside>
        </main>
    </div>

    <div class="black-box">
        <footer class="footer">
            <div class="footer-inner">.footer</div>
        </footer>
    </div>

</div>

</body>
</html>
